<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Vocabulary – Question 1 | Modern English Australia</title>
<style>
:root{
  --bg:#f5f5f5;
  --card:#ffffff;
  --ink:#1e1e1e;
  --muted:#666;
  --accent:#ff7a1a;
  --line:#ccc;
  --radius:16px;
  --shadow:0 6px 24px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.75;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}
header{
  background:var(--ink);
  color:#fff;
  width:100%;
  text-align:center;
  padding:1rem;
  font-weight:600;
}
main{
  max-width:700px;
  background:var(--card);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
  padding:2rem;
  margin:2rem;
  text-align:center;
}
h1{color:var(--accent);margin-bottom:1rem;}
p{margin-bottom:1rem;}
button{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:.6rem 1.2rem;
  font-weight:600;
  cursor:pointer;
  transition:opacity .3s;
}
button:hover{opacity:.9;}
.hidden-words{
  display:none;
  margin-top:1rem;
  text-align:left;
  border-top:1px solid var(--line);
  padding-top:1rem;
}
footer{
  text-align:center;
  color:var(--muted);
  padding:1rem;
  font-size:.9rem;
}
</style>
</head>
<body>

<header>Modern English Australia · Koala Spies Sydney</header>

<main>
  <h1>Hidden Vocabulary – Question 1</h1>
  <p>Click the button below to reveal the vocabulary and explanations for this sentence.</p>

  <button onclick="document.querySelector('.hidden-words').style.display='block'">
    Reveal Vocabulary
  </button>

  <div class="hidden-words">
    <!-- ✳️ Insert your vocab words and notes here -->
    <p><strong>1. Hint</strong></p>
    <ul>
      <li><strong> Starts with:</strong> The committee.</li>

    </ul>
  </div>
</main>

<footer>© Koala Spies Sydney · Modern English Australia · All Rights Reserved</footer>
</body>
</html>
